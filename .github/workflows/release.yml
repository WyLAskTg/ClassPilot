name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Build installer
        run: npm run build

      - name: Remove previous installer assets
        uses: actions/github-script@v7
        with:
          script: |
            const tag = context.ref.replace("refs/tags/", "");
            let release;
            try {
              ({ data: release } = await github.rest.repos.getReleaseByTag({
                ...context.repo,
                tag,
              }));
            } catch (error) {
              if (error.status === 404) return;
              throw error;
            }

            for (const asset of release.assets) {
              const name = asset.name.toLowerCase();
              if (name.endsWith(".exe") || name.endsWith(".exe.blockmap")) {
                await github.rest.repos.deleteReleaseAsset({
                  ...context.repo,
                  asset_id: asset.id,
                });
              }
            }

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ClassPilot ${{ github.ref_name }}
          body_path: RELEASE_NOTES.md
          files: |
            dist/classpilot-setup-*.exe
            dist/classpilot-setup-*.exe.blockmap
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
