name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Build installer
        run: npm run build

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ClassPilot ${{ github.ref_name }}
          body_path: CHANGELOG.md
          files: |
            dist/ClassPilot-Setup-*.exe
            dist/ClassPilot-Setup-*.exe.blockmap
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
